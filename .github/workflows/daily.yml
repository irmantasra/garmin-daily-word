name: Scrape daily readings

on:
  schedule:
    # 05:10 UTC daily (well after both sources publish the new day).
    - cron: "10 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scrape today + next week (and prune old files)
        run: |
          # --days 7 also writes week.json so the watch works offline for days.
          python3 scraper/scrape.py --out docs/data --days 7
          # Keep only the last 14 daily files plus today.json / week.json.
          ls -1 docs/data/*.json 2>/dev/null | grep -E '[0-9]{4}-[0-9]{2}-[0-9]{2}\.json$' \
            | sort | head -n -14 | xargs -r rm -f

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: readings for $(date -u +%F)"
            git push
          fi
